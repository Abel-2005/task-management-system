<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Task Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260521-4" />
</head>

<body>
    <div class="page-root auth-page">
        <div class="auth-card">
            <div class="auth-left">
                <h2>Create Account</h2>
                <p class="muted">Start managing tasks, builds and deployments.</p>
                <form id="signup-form" class="auth-form">
                    <label for="name">Name</label>
                    <input id="name" name="name" type="text" required />

                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required />

                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" required />

                    <button type="submit" class="button">Create Account</button>
                </form>
                <p class="small muted">Already have an account? <a href="login.html">Sign in</a></p>
            </div>
            <div class="auth-right">
                <div class="brand-large">TMS</div>
                <p class="muted">Clean, minimal and responsive demo UI.</p>
            </div>
        </div>
    </div>
    <script src="js/auth.js?v=20260521-4"></script>
</body>

</html>
